spring:
  application:
    name: Novelia
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/novel_viewer
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: true
      hibernate.highlight_sql: true
jwt:
  secret:
    key: ${JWT_SECRET_KEY}
logging:
  level:
    root: info
    com.ian.novelviewer: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
cloud:
  aws:
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
    region:
      static: ap-southeast-2
    s3:
      bucket: ${S3_BUCKET}
springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs
